<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RouteManager — Geotab Add-in</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="addin-RouteManager">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="rm-header">
    <div class="rm-logo">
      <div class="rm-logo-icon">🗺️</div>
      <span class="rm-logo-text">RouteManager</span>
      <span class="rm-logo-version">v1.0</span>
    </div>
    <div style="font-size:11px; color:var(--text-3); font-family:var(--mono)">
      Módulo de Ruteo · MyGeotab
    </div>
  </header>

  <!-- ── Tabs ───────────────────────────────────────────────── -->
  <nav class="rm-tabs">
    <button class="tab-btn tab-btn--active" data-tab="assign">
      ✚ Asignar Ruta
    </button>
    <button class="tab-btn" data-tab="monitor">
      📡 Monitoreo en Vivo
    </button>
    <button class="tab-btn" data-tab="alerts">
      🔔 Alertas
      <span class="tab-badge" id="alerts-badge" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="reports">
      📋 Historial
    </button>
  </nav>

  <!-- ── Content ────────────────────────────────────────────── -->
  <main class="rm-content">

    <!-- Tab: Asignar -->
    <div class="tab-panel tab-panel--active" id="tab-assign">
      <!-- Renderizado dinámicamente por RouteAssignment.init() -->
      <div class="empty-state" style="padding:80px">
        <div class="loader-spinner"></div>
        <span>Cargando módulo...</span>
      </div>
    </div>

    <!-- Tab: Monitor -->
    <div class="tab-panel" id="tab-monitor">
      <!-- Renderizado dinámicamente por RealtimeTracking.init() -->
    </div>

    <!-- Tab: Alertas -->
    <div class="tab-panel" id="tab-alerts">
      <!-- Renderizado dinámicamente por AlertsModule.init() -->
    </div>

    <!-- Tab: Reportes -->
    <div class="tab-panel" id="tab-reports">
      <!-- Renderizado dinámicamente por Reports.init() -->
    </div>

  </main>

  <!-- ── Modal: Nueva Parada ──────────────────────────────────── -->
  <div class="rm-modal" id="waypoint-modal">
    <div class="modal-panel">
      <div id="modal-body">
        <!-- Contenido inyectado dinámicamente -->
      </div>
    </div>
  </div>

  <!-- ── Loader Global ────────────────────────────────────────── -->
  <div id="global-loader">
    <div class="loader-spinner"></div>
    <span style="font-size:13px; color:var(--text-3)">Conectando con Geotab...</span>
  </div>

</div><!-- /addin-RouteManager -->

<!-- ── Scripts ────────────────────────────────────────────────── -->
<!-- Utilidades (cargar primero) -->
<script src="geoUtils.js"></script>
<script src="apiHelpers.js"></script>
<script src="uiHelpers.js"></script>

<!-- Módulos -->
<script src="deviationDetector.js"></script>
<script src="routeAssignment.js"></script>
<script src="realtimeTracking.js"></script>
<script src="alerts.js"></script>
<script src="reports.js"></script>

<!-- App principal -->
<script src="app.js"></script>

</body>
</html>
